[project]
name = "eu-example"
output_dir = "outputs/eu-example"

[queries]
inventory = "queries/eu_queries.txt"

[[sources]]
name = "eu-regulations"
adapter = "eurlex"
enabled = true

[sources.settings]
countries = ["US"]
max_per_term = 5
max_workers = 2
progress_every = 0
obey_robots = true

[normalization]
deduplicate = true
deduplicate_fields = ["title", "url"]

[export]
formats = ["jsonl"]
