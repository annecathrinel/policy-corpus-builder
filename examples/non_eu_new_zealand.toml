[project]
name = "non-eu-new-zealand-example"
output_dir = "outputs/non-eu-new-zealand-example"

[queries]
inventory = "queries/non_eu_new_zealand_queries.txt"

[[sources]]
name = "new-zealand-legislation"
adapter = "non-eu"
enabled = true

[sources.settings]
# Supported New Zealand workflow: API mode with NZ_LEGISLATION_API_KEY.
# `auto` and `scrape` remain provisional fallback modes.
countries = ["NZ"]
nz_mode = "api"
max_per_term = 500
max_pages = 5
max_workers = 8
progress_every = 0
obey_robots = true

[normalization]
deduplicate = true
deduplicate_fields = ["title", "url"]

[export]
formats = ["jsonl"]
